<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- PWA Core -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e8560a" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PaveMail" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="PaveMail" />

    <!-- SEO / Share -->
    <meta name="description" content="AI-powered direct mail platform for concrete driveway contractors. Scan neighborhoods, generate mailers, send postcards — from your truck." />
    <meta property="og:title" content="PaveMail — JWood LLC" />
    <meta property="og:description" content="AI direct mail for concrete contractors. Spot bid, neighborhood campaigns, real postcards." />
    <meta property="og:type" content="website" />

    <!-- Prevent zoom on input focus (iOS) -->
    <style>
      input, select, textarea { font-size: 16px !important; }
      * { -webkit-tap-highlight-color: transparent; }
      body { -webkit-text-size-adjust: 100%; }
    </style>

    <title>PaveMail — JWood LLC</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PaveMail SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }

      // iOS install prompt helper
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.__installPrompt = e;
      });
    </script>
  </body>
</html>
